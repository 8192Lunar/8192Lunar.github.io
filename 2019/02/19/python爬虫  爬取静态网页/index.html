      <p>爬虫新手刚入门，萌新练手交流作</p>
<h2 id="工具"><a href="#工具" class="headerlink" title="工具"></a>工具</h2><ul>
<li>Pycharm</li>
<li>请求库requests</li>
<li>解析库BeautifulSoup</li>
<li>谷歌浏览器<h2 id="代码"><a href="#代码" class="headerlink" title="代码"></a>代码</h2></li>
</ul>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br></pre></td><td class="code"><pre><span class="line">import requests</span><br><span class="line">import bs4</span><br><span class="line">from bs4 import BeautifulSoup</span><br><span class="line"></span><br><span class="line"># 伪装浏览器，获取源代码</span><br><span class="line">def getHtml(url):</span><br><span class="line">    headers=&#123;&apos;User-Agent&apos;:&apos;Mozilla/5.0 (Windows NT 6.1; rv:2.0.1) Gecko/20100101 Firefox/4.0.1&apos;</span><br><span class="line">             &#125;               # 伪装浏览器</span><br><span class="line">    response = requests.get(url,headers=headers)       # 使用request的声明</span><br><span class="line">    if response.status_code == 200:</span><br><span class="line">        return response.text           #  如果响应正常，返回网页源代码</span><br><span class="line">    return None</span><br><span class="line"># 获取页面上所有小说</span><br><span class="line">def get_chinese_novel(url):</span><br><span class="line">    html = getHtml(url)</span><br><span class="line">    soup = BeautifulSoup(html, &apos;lxml&apos;)     #使用BeautifulSoup的lxml库</span><br><span class="line">    novels_dir = []                        # 定义列表</span><br><span class="line">    for all_li in soup.find_all(&apos;li&apos;, class_=&apos;media&apos;):     #寻找所有&lt;li&gt;标签下的&lt;class&gt;为media的节点的内容</span><br><span class="line">        if isinstance(all_li, bs4.element.Tag):          #判断返回的all_al 是否为bs4.element.Tag类型</span><br><span class="line">            for all_novels in all_li.find_all(&apos;a&apos;, class_=&apos;text-white&apos;):  </span><br><span class="line">                novels_info = &#123;&#125;</span><br><span class="line">                novels_info[&apos;name&apos;] = (all_novels.get_text().strip(&apos;\n&apos;))      #  将节点内容的文本放入字典</span><br><span class="line">                novels_info[&apos;url&apos;] = &apos;https://www.wuxiaworld.com&apos; + all_novels.get(&apos;href&apos;)  #将https://www.wuxiaworld.com与节点中的&lt;href&gt;里的链接合起来放入字典</span><br><span class="line">                novels_dir.append(novels_info[&apos;name&apos;])         #将字典里的name放入列表</span><br><span class="line">                novels_dir.append(novels_info[&apos;url&apos;])          #将字典的url放入列表</span><br><span class="line">    return novels_dir                                         #返回列表</span><br><span class="line">#   获取具体的小说的目录，只是url变成了具体哪本小说的url</span><br><span class="line">def get_novel_dir(url):</span><br><span class="line">    html = getHtml(url)</span><br><span class="line">    soup = BeautifulSoup(html, &apos;lxml&apos;)</span><br><span class="line">    books_dir = []</span><br><span class="line">    books_info = &#123;&#125;</span><br><span class="line">    for all_title in soup.find(&apos;div&apos;, class_=&apos;panel-group&apos;).children:</span><br><span class="line">        if isinstance(all_title, bs4.element.Tag):</span><br><span class="line">            books_info = &#123;&#125;</span><br><span class="line">            for all_a in all_title.find_all(&apos;li&apos;, class_=&apos;chapter-item&apos;):</span><br><span class="line">                books_info[&apos;name&apos;] = (all_a.get_text())</span><br><span class="line">                books_info[&apos;url&apos;] = &apos;https://www.wuxiaworld.com&apos; + all_a.a.get(&apos;href&apos;)</span><br><span class="line">                books_dir.append(books_info[&apos;name&apos;])</span><br><span class="line">                books_dir.append(books_info[&apos;url&apos;])</span><br><span class="line">    return books_dir</span><br><span class="line">#将 get_chinese_novel()获得的列表转化为字典</span><br><span class="line">def novels_dict(url):</span><br><span class="line">    dict = &#123;&#125;</span><br><span class="line">    list_novels = get_chinese_novel(url)</span><br><span class="line">    for i in range(len(list_novels) - 1):</span><br><span class="line">        if i % 2 == 0:</span><br><span class="line">            dict[list_novels[i]] = list_novels[i + 1]     # 将列表两两配对成字典，便于根据书名查找链接</span><br><span class="line">        else:</span><br><span class="line">            continue</span><br><span class="line">    return dict</span><br><span class="line">url = &apos;https://www.wuxiaworld.com/language/chinese&apos;</span><br><span class="line">novel_name = input(&quot;请输入书名：&quot;)</span><br><span class="line">for i in get_novel_dir(novels_dict(url)[novel_name]):</span><br><span class="line">    print(i)</span><br></pre></td></tr></table></figure>
