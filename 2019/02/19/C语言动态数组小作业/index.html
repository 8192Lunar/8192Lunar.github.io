      <h2 id="输入任意数量的整数（用动态数组存放），将它们排序输出"><a href="#输入任意数量的整数（用动态数组存放），将它们排序输出" class="headerlink" title="输入任意数量的整数（用动态数组存放），将它们排序输出"></a>输入任意数量的整数（用动态数组存放），将它们排序输出</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br></pre></td><td class="code"><pre><span class="line">#include&lt;stdio.h&gt;</span><br><span class="line">#include&lt;stdlib.h&gt;</span><br><span class="line">int main()</span><br><span class="line">&#123;</span><br><span class="line">	int *sort(int NUM,int N,int *p);                           ///函数声明</span><br><span class="line">	int size=4,n=0,i,j,num=0;</span><br><span class="line">	int *arr;</span><br><span class="line">	char ch;</span><br><span class="line">	arr=(int *)calloc(size,sizeof(int));                       ///先构建大小为4个int类型的动态数组</span><br><span class="line">	printf(&quot;请输入任意数量的正数,中间用空格隔开：\n&quot;);</span><br><span class="line">	for(i=0;ch!=&apos;\n&apos;;i++)                                      ///当接收到回车时结束循环</span><br><span class="line">	&#123;</span><br><span class="line">		n++;                                                   ///作为判断数组是否需要延长的条件</span><br><span class="line">		scanf(&quot;%d&quot;,&amp;arr[i]);</span><br><span class="line">		ch=getchar();</span><br><span class="line">		if(n==size)&#123;                                           ///适时延长数组</span><br><span class="line">			size+=4;</span><br><span class="line">			arr=(int *)realloc(arr,size*sizeof(int));          ///重新分配动态存储区</span><br><span class="line">		&#125;</span><br><span class="line">	 &#125;</span><br><span class="line">	 arr=(int *)realloc(arr,n*sizeof(int));                    ///将多余的存储区去除</span><br><span class="line">	 printf(&quot;请选择排序方法\n（1：升序排序，2：降序排序）：&quot;);</span><br><span class="line">	 scanf(&quot;%d&quot;,&amp;num);</span><br><span class="line">	 printf(&quot;排序如下：\n&quot;);</span><br><span class="line">	 for(j=0;j&lt;n;j++)&#123;</span><br><span class="line">	 	printf(&quot;%d &quot;,sort(num,n,arr)[j]);</span><br><span class="line">	 &#125;</span><br><span class="line">	 free(arr);                                                ///释放指针，并将其指向NULL</span><br><span class="line">	 arr=NULL;</span><br><span class="line">	 printf(&quot;\n&quot;);</span><br><span class="line">	 return 0;</span><br><span class="line">&#125;</span><br><span class="line">int *sort(int NUM,int N,int *p)</span><br><span class="line">&#123;</span><br><span class="line">	int *decrease(int a,int *p1);</span><br><span class="line">	int *increase(int b,int *p2);</span><br><span class="line">	if(NUM==1)&#123;</span><br><span class="line"> 		p=decrease(N,p);</span><br><span class="line">	&#125;</span><br><span class="line">	if(NUM==2)&#123;</span><br><span class="line">		p=increase(N,p);</span><br><span class="line">	&#125;</span><br><span class="line">	return p;</span><br><span class="line">&#125;</span><br><span class="line">int *decrease(int a,int *p1)                           ///使用起泡法进行升序和降序操作</span><br><span class="line">&#123;</span><br><span class="line">	int i,j;</span><br><span class="line">	int t=0;</span><br><span class="line">	for(i=0;i&lt;a;i++)&#123;</span><br><span class="line">	for(j=0;j&lt;a-1;j++)</span><br><span class="line">	&#123;</span><br><span class="line">		if(p1[j]&gt;p1[j+1])</span><br><span class="line">		&#123;	</span><br><span class="line">			t=p1[j];</span><br><span class="line">			p1[j]=p1[j+1];</span><br><span class="line">			p1[j+1]=t;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	return p1;</span><br><span class="line">&#125;</span><br><span class="line">int *increase(int b,int *p2)</span><br><span class="line">&#123;</span><br><span class="line">	int i,j;</span><br><span class="line">	int t=0;</span><br><span class="line">	for(i=0;i&lt;b;i++)&#123;</span><br><span class="line">	for(j=0;j&lt;b-1;j++)</span><br><span class="line">	&#123;</span><br><span class="line">		if(p2[j]&lt;p2[j+1])</span><br><span class="line">		&#123;</span><br><span class="line">			t=p2[j];</span><br><span class="line">			p2[j]=p2[j+1];</span><br><span class="line">			p2[j+1]=t;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	 &#125;</span><br><span class="line">	return p2;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
